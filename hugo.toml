baseURL = "https://my-blog-5ay.pages.dev/"
languageCode = "zh-cn"
title = "Judy的Blog"
theme = "PaperMod"

[pagination]
pagerSize = 5

[params]
env = "production"
title = "Judy的Blog"
description = "记录技术学习、项目实践与思考"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
ShowWordCount = false
UseHugoToc = true

[params.profileMode]
enabled = true
title = "Judy"
subtitle = "后端 / AI 应用 / 技术项目记录\n记录技术学习、项目实践与思考"
imageUrl = "/img/avatar.png"
imageTitle = "Judy"
imageWidth = 160
imageHeight = 160

[[params.profileMode.buttons]]
name = "博客文章"
url = "/posts"

[[params.profileMode.buttons]]
name = "关于我"
url = "/about"

[[params.socialIcons]]
name = "github"
url = "https://github.com/Judyrobot"

[menu]

[[menu.main]]
identifier = "posts"
name = "文章"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 30

[[menu.main]]
identifier = "about"
name = "关于"
url = "/about/"
weight = 40